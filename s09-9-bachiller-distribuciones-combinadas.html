<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro estas distribuciones?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Control de calidad</strong>
<p>Una fábrica produce tornillos con un 2% de defectuosos. Si seleccionas 100 tornillos, ¿cuántos esperarías que sean defectuosos?</p>
<p>Binomial: $X \sim B(100, 0.02)$ → Espera $np = 2$ defectuosos.</p>
<p>¿Y si la fábrica produce 1000 tornillos al día? Poisson: $X \sim P(\lambda = 20)$ defectuosos/día.</p>
<p>¿Y si quieres saber la probabilidad de que entre 18 y 22 sean defectuosos? Normal: $X \sim N(20, \sqrt{19.6})$.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Las Tres Distribuciones</h2>

<div class="box box-teoria">
<strong>📌 Distribución Binomial $B(n, p)$:</strong>
<p style="margin-top:.5rem">Número de éxitos en $n$ ensayos independientes con probabilidad $p$.</p>
$$P(X = k) = \binom{n}{k} p^k (1-p)^{n-k}$$
<p style="margin-top:.5rem"><strong>Distribución de Poisson $P(\lambda)$:</strong></p>
$$P(X = k) = \frac{\lambda^k e^{-\lambda}}{k!}$$
<p style="margin-top:.5rem"><strong>Distribución Normal $N(\mu, \sigma)$:</strong></p>
$$f(x) = \frac{1}{\sigma\sqrt{2\pi}} e^{-\frac{(x-\mu)^2}{2\sigma^2}}$$
</div>

<div class="summary">
<h3>📋 Resumen de lo que aprendiste</h3>
<ul>
<li>Binomial: éxitos en $n$ ensayos → $B(n,p)$</li>
<li>Poisson: eventos raros en un intervalo → $P(\lambda)$</li>
<li>Normal: la campana de Gauss → $N(\mu, \sigma)$</li>
<li>La normal aproxima a la binomial cuando $n$ es grande</li>
<li>Aplicaciones: control de calidad, telecomunicaciones, finanzas, ciencia</li>
</ul>
