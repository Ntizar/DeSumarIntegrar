<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro límites multivariable?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Temperatura en una habitación</strong>
<p>La temperatura $T(x, y, z)$ depende de las tres coordenadas. ¿Qué pasa con la temperatura cuando te acercas a la ventana?</p>
<p>El límite multivariable nos dice hacia dónde se acerca la temperatura cuando nos acercamos a un punto desde CUALQUIER dirección.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Límites en R²</h2>
<p>Para funciones de dos variables $f(x, y)$, el límite cuando $(x, y) \to (a, b)$ debe ser el mismo <strong>en todas las trayectorias</strong>.</p>

<div class="box box-teoria">
<strong>📌 Condición de existencia:</strong>
<p style="margin-top:.5rem">El límite $\lim_{(x,y) \to (a,b)} f(x,y)$ existe si y solo si es el mismo siguiendo CUALQUIER camino hacia $(a,b)$.</p>
</div>

<!-- GRÁFICO: Trayectorias -->
<div class="chart-container">
<h3>📊 El límite debe ser el mismo en todas las trayectorias</h3>
<p class="chart-desc">Observa cómo al acercarte a $(0,0)$ por diferentes caminos, el valor debe ser el mismo.</p>
<div id="plot-trayectorias" class="chart-plot"></div>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">2️⃣ Ejercicios Interactivos</h2>

<div class="exercise">
<p><strong>Ejercicio 1:</strong> Si el límite por la recta $y = x$ es 1 y por la recta $y = 0$ es 2, ¿existe el límite?</p>
<div class="exercise-input">
<select id="e1" style="padding:.5rem;border:2px solid #e2e8f0;border-radius:8px;font-size:1rem">
<option value="">— Elige —</option>
<option value="no">No, porque las trayectorias dan valores diferentes</option>
<option value="si">Sí, siempre existe</option>
</select>
<button onclick="checkE1()">Comprobar</button>
</div>
<div class="feedback" id="e1-fb"></div>
</div>
</div>

<div class="summary">
<h3>📋 Resumen</h3>
<ul>
<li>El límite en R² debe ser el mismo en TODAS las trayectorias</li>
<li>Si dos trayectorias dan valores diferentes → el límite NO existe</li>
<li>La continuidad en R²: $f(a,b) = \lim_{(x,y) \to (a,b)} f(x,y)$</li>
</ul>
</div>
