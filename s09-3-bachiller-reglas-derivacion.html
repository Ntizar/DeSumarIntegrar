<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro las reglas de derivación?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Optimización de recursos</strong>
<p>Una fábrica quiere maximizar sus beneficios. El beneficio depende de la cantidad producida: $B(x) = -x^2 + 20x - 50$. ¿Cuántas unidades debe producir?</p>
<p>La respuesta está en derivar: $B'(x) = -2x + 20 = 0$ → $x = 10$ unidades.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Reglas Básicas de Derivación</h2>

<div class="box box-teoria">
<strong>📌 Reglas fundamentales:</strong>
<ul style="padding-left:1.2rem;margin-top:.5rem">
<li><strong>Constante:</strong> $\frac{d}{dx}[c] = 0$</li>
<li><strong>Potencia:</strong> $\frac{d}{dx}[x^n] = nx^{n-1}$</li>
<li><strong>Suma:</strong> $\frac{d}{dx}[f + g] = f' + g'$</li>
<li><strong>Producto:</strong> $\frac{d}{dx}[f \cdot g] = f'g + fg'$</li>
<li><strong>Cociente:</strong> $\frac{d}{dx}\left[\frac{f}{g}\right] = \frac{f'g - fg'}{g^2}$</li>
<li><strong>Constante × función:</strong> $\frac{d}{dx}[c \cdot f] = c \cdot f'$</li>
</ul>
</div>

<!-- GRÁFICO: Regla de la potencia -->
<div class="chart-container">
<h3>📊 Visualiza la regla de la potencia: $f(x) = x^n$ y su derivada</h3>
<p class="chart-desc">Observa cómo la derivada de $x^n$ es $nx^{n-1}$. Cambia el valor de $n$.</p>

</div>

<div class="chapter">
<h2 class="chapter-title">2️⃣ Regla de la Cadena</h2>
<p>La regla de la cadena es la más importante. Se usa cuando una función está "dentro" de otra.</p>

<div class="box box-teoria">
<strong>📌 Regla de la cadena:</strong>
$$\frac{d}{dx}[f(g(x))] = f'(g(x)) \cdot g'(x)$$
<p style="margin-top:.5rem">O en notación más intuitiva: si $y = f(u)$ y $u = g(x)$, entonces:</p>
$$\frac{dy}{dx} = \frac{dy}{du} \cdot \frac{du}{dx}$$
</div>

<div class="box box-ejemplo">
<strong>💡 Ejemplo:</strong>
<p style="margin-top:.5rem">Derivar $f(x) = (3x + 1)^5$</p>
<p style="margin-top:.5rem">Identificamos: $f(u) = u^5$ donde $u = 3x + 1$</p>
<p style="margin-top:.5rem">$f'(u) = 5u^4$ y $u' = 3$</p>
<p style="margin-top:.5rem">$$f'(x) = 5(3x+1)^4 \cdot 3 = 15(3x+1)^4$$</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">3️⃣ Derivadas de Funciones Especiales</h2>

<div class="box box-teoria">
<strong>📌 Derivadas que debes saber:</strong>
<ul style="padding-left:1.2rem;margin-top:.5rem">
<li>$\frac{d}{dx}[\sin(x)] = \cos(x)$</li>
<li>$\frac{d}{dx}[\cos(x)] = -\sin(x)$</li>
<li>$\frac{d}{dx}[e^x] = e^x$ (¡la única función que es su propia derivada!)</li>
<li>$\frac{d}{dx}[\ln(x)] = \frac{1}{x}$</li>
<li>$\frac{d}{dx}[a^x] = a^x \ln(a)$</li>
</ul>
</div>

<!-- GRÁFICO: Derivadas trigonométricas -->
<div class="chart-container">
<h3>📊 Derivadas de funciones trigonométricas</h3>
<p class="chart-desc">Observa que la derivada de $\sin(x)$ es $\cos(x)$, y la derivada de $\cos(x)$ es $-\sin(x)$.</p>
<div id="plot-trig" class="chart-plot"></div>
</div>

<div class="summary">
<h3>📋 Resumen de lo que aprendiste</h3>
<ul>
<li>Potencia: $\frac{d}{dx}[x^n] = nx^{n-1}$</li>
<li>Suma: derivar cada término por separado</li>
<li>Producto: $(fg)' = f'g + fg'$</li>
<li>Cociente: $\left(\frac{f}{g}\right)' = \frac{f'g - fg'}{g^2}$</li>
<li>Regla de la cadena: $\frac{d}{dx}[f(g(x))] = f'(g(x)) \cdot g'(x)$</li>
<li>$\frac{d}{dx}[e^x] = e^x$ — ¡la única función que es su propia derivada!</li>
<li>$\frac{d}{dx}[\sin(x)] = \cos(x)$ y $\frac{d}{dx}[\cos(x)] = -\sin(x)$</li>
<li>$\frac{d}{dx}[\ln(x)] = \frac{1}{x}$</li>
</ul>
