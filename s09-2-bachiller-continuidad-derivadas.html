<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro la continuidad en la vida real?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Temperatura</strong>
<p>La temperatura exterior cambia de forma continua. Si a las 6am está a 5°C y a las 6pm está a 25°C, en algún momento debió estar exactamente a 15°C. ¡Eso es el Teorema del Valor Intermedio!</p>
<p>La temperatura no salta de 5°C a 25°C de golpe. Pasa por TODOS los valores intermedios.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ ¿Qué es la Continuidad?</h2>
<p>Una función $f(x)$ es <strong>continua</strong> en un punto $x = a$ si se cumplen las tres condiciones:</p>

<div class="box box-teoria">
<strong>📌 Tres condiciones para la continuidad:</strong>
<ol style="padding-left:1.2rem;margin-top:.5rem">
<li>$f(a)$ está definida (la función existe en $a$)</li>
<li>$\lim_{x \to a} f(x)$ existe (el límite existe)</li>
<li>$\lim_{x \to a} f(x) = f(a)$ (el límite es igual al valor de la función)</li>
</ol>
</div>

<!-- GRÁFICO: Continuidad -->
<div class="chart-container">
<h3>📊 Visualiza la continuidad: $f(x) = x^2$</h3>
<p class="chart-desc">Esta función es continua en todos los puntos. No tiene saltos ni huecos.</p>
<div id="plot-continuidad" class="chart-plot"></div>
</div>

<h3 style="color:var(--naranja);margin:1.5rem 0 .8rem">Tipos de discontinuidad</h3>

<table>
<tr><th>Tipo</th><th>Descripción</th><th>Ejemplo</th></tr>
<tr><td><strong>Evitable</strong></td><td>El límite existe pero $f(a)$ no está definida o es diferente</td><td>$\frac{x^2-4}{x-2}$ en $x=2$</td></tr>
<tr><td><strong>De salto</strong></td><td>Los límites laterales existen pero son diferentes</td><td>Función escalón</td></tr>
<tr><td><strong>Infinita</strong></td><td>El límite es $\pm\infty$</td><td>$\frac{1}{x}$ en $x=0$</td></tr>
</table>
</div>

<div class="chapter">
<h2 class="chapter-title">2️⃣ La Derivada: Tasa de Cambio Instantánea</h2>
<p>La <strong>derivada</strong> de $f(x)$ en $x = a$ mide cómo cambia $f(x)$ cuando $x$ cambia un poquito.</p>

<div class="formula" style="background:#f1f5f9;padding:1rem 1.2rem;border-radius:8px;font-size:1.2rem;text-align:center;margin:1rem 0;border-left:4px solid var(--azul)">
$$f'(a) = \lim_{h \to 0} \frac{f(a+h) - f(a)}{h}$$
</div>

<div class="box box-ejemplo">
<strong>💡 Intuición geométrica:</strong>
<p>La derivada es la <strong>pendiente de la recta tangente</strong> a la curva en un punto. Si la curva es una carretera, la derivada te dice qué tan empinada es en cada punto.</p>
</div>

<!-- GRÁFICO: Derivada como pendiente -->
<div class="chart-container">
<h3>📊 La derivada es la pendiente de la tangente: $f(x) = x^2$</h3>
<p class="chart-desc">Mueve el slider para ver cómo la recta tangente cambia de pendiente en cada punto.</p>
<div id="plot-derivada" class="chart-plot"></div>
<div class="chart-controls">
<button onclick="setDerivPoint(0)">x = 0</button>
<button onclick="setDerivPoint(0.5)">x = 0.5</button>
<button onclick="setDerivPoint(1)">x = 1</button>
<button onclick="setDerivPoint(1.5)">x = 1.5</button>
<button onclick="setDerivPoint(2)">x = 2</button>
</div>
<p style="margin-top:.8rem;font-weight:600" id="deriv-result">Haz clic en un botón</p>
</div>

<div class="box box-teoria">
<strong>📌 Interpretaciones de la derivada:</strong>
<ul style="padding-left:1.2rem;margin-top:.5rem">
<li><strong>Geométrica:</strong> Pendiente de la recta tangente</li>
<li><strong>Física:</strong> Velocidad instantánea (derivada de la posición)</li>
<li><strong>Económica:</strong> Coste marginal (derivada del coste)</li>
<li><strong>Biológica:</strong> Tasa de crecimiento (derivada de la población)</li>
</ul>
</div>
</div>

<div class="summary">
<h3>📋 Resumen de lo que aprendiste</h3>
<ul>
<li>Una función es continua en $x=a$ si: existe $f(a)$, existe el límite, y son iguales</li>
<li>Tres tipos de discontinuidad: evitable, de salto, infinita</li>
<li>El Teorema del Valor Intermedio: si $f$ es continua en $[a,b]$ y $k$ está entre $f(a)$ y $f(b)$, existe $c \in (a,b)$ tal que $f(c) = k$</li>
<li>La derivada $f'(a)$ es la pendiente de la recta tangente en $x=a$</li>
<li>La derivada se calcula con el límite: $f'(a) = \lim_{h \to 0} \frac{f(a+h) - f(a)}{h}$</li>
<li>La derivada tiene múltiples interpretaciones: pendiente, velocidad, coste marginal, tasa de crecimiento</li>
</ul>
</div>
