<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro autovalores?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Google PageRank</strong>
<p>PageRank usa autovalores para determinar la importancia de las páginas web. La página con el mayor autovector asociado al autovalor dominante es la más importante.</p>
<p>¡Sin álgebra lineal, Google no existiría!</p>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Autovalores y Autovectores</h2>

<div class="formula" style="background:#f1f5f9;padding:1rem 1.2rem;border-radius:8px;font-size:1.2rem;text-align:center;margin:1rem 0;border-left:4px solid #6366f1">
$$A\vec{v} = \lambda\vec{v}$$
</div>

<p>Un autovector $\vec{v}$ es un vector que al ser multiplicado por $A$ solo se escala (no cambia de dirección).</p>

<!-- GRÁFICO: Autovalores -->
<div class="chart-container">
<h3>📊 Visualización de autovalores y autovectores</h3>
<p class="chart-desc">Observa cómo los autovectores mantienen su dirección al aplicar la transformación.</p>
<div id="plot-eigen" class="chart-plot"></div>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">2️⃣ Ejercicios Interactivos</h2>

<div class="exercise">
<p><strong>Ejercicio 1:</strong> Si $A = \begin{pmatrix} 2 & 0 \\ 0 & 3 \end{pmatrix}$, ¿cuáles son los autovalores?</p>
<div class="exercise-input">
<input type="text" id="e1" placeholder="λ₁, λ₂ = " style="width:200px">
<button onclick="checkE1()">Comprobar</button>
</div>
<div class="feedback" id="e1-fb"></div>
</div>
</div>

<div class="summary">
<h3>📋 Resumen</h3>
<ul>
<li>Autovalor: $A\vec{v} = \lambda\vec{v}$ — la matriz solo escala el autovector</li>
<li>Se calculan resolviendo $\det(A - \lambda I) = 0$</li>
<li>Aplicaciones: PageRank, vibraciones, PCA, compresión de imágenes</li>
</ul>
