<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro EDOs?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Crecimiento poblacional</strong>
<p>La tasa de cambio de una población es proporcional a la población actual: $\frac{dP}{dt} = kP$.</p>
<p>La solución es $P(t) = P_0 e^{kt}$ — ¡el famoso crecimiento exponencial!</p>
<p>Aplicaciones: población, interés compuesto, desintegración radiactiva, crecimiento de bacterias.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ EDOs Separables</h2>

<div class="formula" style="background:#f1f5f9;padding:1rem 1.2rem;border-radius:8px;font-size:1.2rem;text-align:center;margin:1rem 0;border-left:4px solid var(--azul)">
$$\frac{dy}{dx} = f(x)g(y) \implies \frac{dy}{g(y)} = f(x)\,dx \implies \int \frac{dy}{g(y)} = \int f(x)\,dx$$
</div>

<!-- GRÁFICO: Solución de EDO -->
<div class="chart-container">
<h3>📊 Solución de $\frac{dy}{dx} = ky$: Crecimiento exponencial</h3>
<p class="chart-desc">Observa cómo la solución $y = y_0 e^{kt}$ crece exponencialmente.</p>
<div id="plot-edo" class="chart-plot"></div>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">2️⃣ Ejercicios Interactivos</h2>

<div class="exercise">
<p><strong>Ejercicio 1:</strong> Resuelve $\frac{dy}{dx} = 2x$ con $y(0) = 3$</p>
<p style="font-size:.85rem;color:#64748b">Separa: $dy = 2x\,dx$, integra: $y = x^2 + C$, usa la condición inicial.</p>
<div class="exercise-input">
<input type="number" id="e1" placeholder="y(1) = ?" step="any">
<button onclick="checkExercise(1, 2)">Comprobar</button>
</div>
<div class="feedback" id="e1-fb"></div>
</div>
</div>

<div class="summary">
<h3>📋 Resumen</h3>
<ul>
<li>EDO separable: $\frac{dy}{dx} = f(x)g(y)$ → separar e integrar</li>
<li>EDO lineal: $\frac{dy}{dx} + P(x)y = Q(x)$ → factor integrante $\mu(x) = e^{\int P(x)dx}$</li>
<li>Aplicaciones: crecimiento poblacional, enfriamiento de Newton, circuitos RC</li>
</ul>
</div>
