<div class="chapter">
<h2 class="chapter-title">🎯 Este es el repaso final de Bachillerato</h2>
<div class="box box-teoria">
<strong>Resumen de todo el curso:</strong>
<ul style="padding-left:1.2rem;margin-top:.5rem">
<li><strong>Límites:</strong> Hacia dónde va una función cuando x se acerca a un valor</li>
<li><strong>Continuidad:</strong> Funciones sin saltos ni huecos</li>
<li><strong>Derivadas:</strong> Tasa de cambio instantánea, pendiente de la tangente</li>
<li><strong>Optimización:</strong> Máximos y mínimos con derivadas</li>
<li><strong>Integrales:</strong> Área bajo la curva, operación inversa de derivar</li>
<li><strong>Probabilidad:</strong> Bayes, combinaciones, distribuciones</li>
</ul>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">🧠 Ejercicios Integradores</h2>

<div class="exercise">
<p><strong>Ejercicio 1 (Límites):</strong> Calcula $\lim_{x \to 0} \frac{\sin(3x)}{x}$</p>
<div class="exercise-input">
<input type="number" id="e1" placeholder="?" step="any">
<button onclick="checkExercise(1, 3)">Comprobar</button>
</div>
<div class="feedback" id="e1-fb"></div>
</div>

<div class="exercise">
<p><strong>Ejercicio 2 (Derivadas):</strong> Deriva $f(x) = x^3 \cdot e^x$ usando la regla del producto.</p>
<p style="font-size:.85rem;color:#64748b">$(fg)' = f'g + fg'$</p>
<div class="exercise-input">
<input type="text" id="e2" placeholder="f'(x) = " style="width:250px">
<button onclick="checkE2()">Comprobar</button>
</div>
<div class="feedback" id="e2-fb"></div>
</div>

<div class="exercise">
<p><strong>Ejercicio 3 (Integrales):</strong> Calcula $\int_0^1 (3x^2 + 2x)\,dx$</p>
<div class="exercise-input">
<input type="number" id="e3" placeholder="?" step="any">
<button onclick="checkExercise(3, 2)">Comprobar</button>
</div>
<div class="feedback" id="e3-fb"></div>
</div>

<div class="exercise">
<p><strong>Ejercicio 4 (Probabilidad):</strong> Si $X \sim B(20, 0.3)$, ¿cuál es $E[X]$?</p>
<p style="font-size:.85rem;color:#64748b">Esperanza de una binomial: $E[X] = np$</p>
<div class="exercise-input">
<input type="number" id="e4" placeholder="?" step="any">
<button onclick="checkExercise(4, 6)">Comprobar</button>
</div>
<div class="feedback" id="e4-fb"></div>
</div>
</div>

<div class="summary">
<h3>📋 Resumen final de Bachillerato</h3>
<ul>
<li>Los límites son la base de todo el cálculo</li>
<li>Las derivadas miden tasas de cambio y optimizan funciones</li>
<li>Las integrales calculan áreas y son la operación inversa de derivar</li>
<li>La probabilidad modela la incertidumbre y los datos aleatorios</li>
<li>¡Todo está conectado! El cálculo es la herramienta más poderosa de las matemáticas</li>

</ul>
