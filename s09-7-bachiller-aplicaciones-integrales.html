<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro volúmenes de revolución?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Diseñar una botella</strong>
<p>Las botellas de vidrio se fabrican girando un perfil alrededor de un eje. El volumen de la botella se calcula con integrales de revolución.</p>
<p>Si el perfil de la botella sigue $y = f(x)$, el volumen es $V = \pi \int_a^b [f(x)]^2\,dx$.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Volúmenes de Revolución</h2>

<div class="box box-teoria">
<strong>📌 Método de discos:</strong>
$$V = \pi \int_a^b [f(x)]^2\,dx$$
<p style="margin-top:.5rem"><strong>Método de arcos (shell):</strong></p>
$$V = 2\pi \int_a^b x \cdot f(x)\,dx$$
</div>

<!-- GRÁFICO: Volumen de revolución -->
<div class="chart-container">
<h3>📊 Volúmen de revolución: $y = x^2$ girando alrededor del eje x</h3>
<p class="chart-desc">Observa cómo la región bajo la curva genera un sólido al girar.</p>
<div id="plot-volumen" class="chart-plot"></div>
</div>

<p style="font-size:.85rem;color:#64748b">$V = \pi \int_0^2 x^2\,dx = \pi \cdot \frac{8}{3}$</p>
