<div class="chapter">
<h2 class="chapter-title">1️⃣ Transformaciones Lineales</h2>

<div class="box box-teoria">
<strong>📌 Una transformación $T$ es lineal si:</strong>
<ul style="padding-left:1.2rem;margin-top:.5rem">
<li>$T(\vec{u} + \vec{v}) = T(\vec{u}) + T(\vec{v})$</li>
<li>$T(c\vec{v}) = cT(\vec{v})$</li>
</ul>
</div>

<!-- GRÁFICO: Transformaciones -->
