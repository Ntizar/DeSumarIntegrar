<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro el área bajo la curva?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Distancia recorrida</strong>
<p>Si graficas la velocidad $v(t)$ en función del tiempo, el área bajo la curva es la distancia recorrida.</p>
<p>Si la velocidad es constante $v = 60$ km/h durante 2 horas: Área = $60 \times 2 = 120$ km.</p>
<p>Si la velocidad varía: el área bajo la curva $v(t)$ sigue siendo la distancia total.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Teorema Fundamental del Cálculo</h2>

<div class="formula" style="background:#f1f5f9;padding:1rem 1.2rem;border-radius:8px;font-size:1.2rem;text-align:center;margin:1rem 0;border-left:4px solid var(--azul)">
$$\int_a^b f(x)\,dx = F(b) - F(a)$$
</div>

<p>Donde $F$ es una antiderivada de $f$ (es decir, $F'(x) = f(x)$).</p>

<div class="box box-ejemplo">
<strong>💡 Ejemplo:</strong>
<p style="margin-top:.5rem">Calcular $\int_0^2 x^2\,dx$</p>
<p style="margin-top:.5rem">Antiderivada: $F(x) = \frac{x^3}{3}$</p>
<p style="margin-top:.5rem">$$\int_0^2 x^2\,dx = F(2) - F(0) = \frac{8}{3} - 0 = \mathbf{\frac{8}{3}}$$</p>
</div>

<!-- GRÁFICO: Área bajo la curva -->
<div class="chart-container">
<h3>📊 El área bajo $f(x) = x^2$ de 0 a 2 es 8/3</h3>
<p class="chart-desc">Observa el área sombreada bajo la curva. ¡Esa área es exactamente la integral definida!</p>
<div id="plot-area" class="chart-plot"></div>
</div>
</div>

<li>La integral indefinida es una función (más la constante $C$)</li>
