<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro Bayes?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Diagnóstico médico</strong>
<p>Una enfermedad afecta al 1% de la población. Un test tiene 95% de sensibilidad (detecta la enfermedad si la tienes) y 90% de especificidad (da negativo si no la tienes).</p>
<p>Si el test es positivo, ¿cuál es la probabilidad real de que tengas la enfermedad?</p>
<p>¡Bayes! $P(D|+) = \frac{P(+|D) \cdot P(D)}{P(+|D) \cdot P(D) + P(+|\neg D) \cdot P(\neg D)} = \frac{0.95 \times 0.01}{0.95 \times 0.01 + 0.10 \times 0.99} \approx \mathbf{8.8\%}$</p>
<p>¡Solo un 8.8%! Aunque el test sea "95% preciso", la probabilidad real es mucho menor por la baja prevalencia.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Teorema de Bayes</h2>

<div class="formula" style="background:#f1f5f9;padding:1rem 1.2rem;border-radius:8px;font-size:1.2rem;text-align:center;margin:1rem 0;border-left:4px solid var(--azul)">
$$P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}$$
</div>

<!-- GRÁFICO: Bayes -->
<div class="chart-container">
<h3>📊 Visualización del teorema de Bayes</h3>
<p class="chart-desc">El test parece bueno, pero la probabilidad real de tener la enfermedad es baja.</p>
<div id="plot-bayes" class="chart-plot"></div>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">2️⃣ Combinatoria</h2>

<div class="box box-teoria">
<strong>📌 Permutaciones:</strong> $P(n,k) = \frac{n!}{(n-k)!}$ (el orden importa)
<strong>📌 Combinaciones:</strong> $C(n,k) = \binom{n}{k} = \frac{n!}{k!(n-k)!}$ (el orden no importa)
</div>
</div>

<div class="summary">
<h3>📋 Resumen de lo que aprendiste</h3>
<ul>
<li>Bayes: $P(A|B) = \frac{P(B|A) \cdot P(A)}{P(B)}$</li>
<li>La probabilidad posterior depende de la prevalencia (prior)</li>
<li>Permutaciones: orden importa → $P(n,k) = \frac{n!}{(n-k)!}$</li>
<li>Combinaciones: orden no importa → $C(n,k) = \frac{n!}{k!(n-k)!}$</li>
<li>Aplicaciones: diagnóstico médico, IA, finanzas, ingeniería</li>
</ul>
