<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro derivadas parciales?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Temperatura en una habitación</strong>
<p>La temperatura $T(x, y)$ depende de la posición. $\frac{\partial T}{\partial x}$ te dice cuánto cambia la temperatura si te mueves en la dirección x.</p>
<p>El <strong>gradiente</strong> $\nabla T = \left(\frac{\partial T}{\partial x}, \frac{\partial T}{\partial y}\right)$ apunta en la dirección de máximo crecimiento de la temperatura.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Derivadas Parciales</h2>

<div class="formula" style="background:#f1f5f9;padding:1rem 1.2rem;border-radius:8px;font-size:1.2rem;text-align:center;margin:1rem 0;border-left:4px solid var(--azul)">
$$\frac{\partial f}{\partial x} = \lim_{h \to 0} \frac{f(x+h, y) - f(x, y)}{h}$$
</div>

<!-- GRÁFICO: Derivadas parciales -->
<div class="chart-container">
<h3>📊 Derivadas parciales de $f(x,y) = x^2 + y^2$</h3>
<p class="chart-desc">Observa cómo $\frac{\partial f}{\partial x}$ y $\frac{\partial f}{\partial y}$ miden el cambio en cada dirección.</p>
<div id="plot-parciales" class="chart-plot"></div>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">2️⃣ El Gradiente</h2>

<div class="box box-teoria">
<strong>📌 El gradiente:</strong>
$$\nabla f = \left(\frac{\partial f}{\partial x}, \frac{\partial f}{\partial y}\right)$$
<p style="margin-top:.5rem">El gradiente apunta en la dirección de máximo crecimiento y su magnitud es la tasa de cambio máxima.</p>
</div>
</div>

<div class="chapter">
