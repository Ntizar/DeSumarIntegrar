<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro EDOs de segundo orden?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Un resorte que oscila</strong>
<p>La ecuación del movimiento de un resorte es $mx'' + cx' + kx = 0$.</p>
<p>Si no hay amortiguación ($c = 0$): $mx'' + kx = 0$ → $x(t) = A\cos(\omega t) + B\sin(\omega t)$ donde $\omega = \sqrt{k/m}$.</p>
<p>¡Esto describe todo: puentes que se balancean, circuitos RLC, átomos vibrando!</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Ecuación Característica</h2>

$$ay'' + by' + cy = 0 \implies ar^2 + br + c = 0$$
</div>

<div class="exercise">
<p><strong>Ejercicio 1:</strong> Resuelve $y'' - 4y = 0$</p>
<p style="font-size:.85rem;color:#64748b">Ecuación característica: $r^2 - 4 = 0$ → $r = \pm 2$</p>
<div class="exercise-input">
<input type="text" id="e1" placeholder="y = " style="width:250px">
<button onclick="checkE1()">Comprobar</button>
</div>
<div class="feedback" id="e1-fb"></div>

<div class="summary">
<h3>📋 Resumen</h3>
<ul>
<li>EDO 2º orden: $ay'' + by' + cy = 0$ → ecuación característica $ar^2 + br + c = 0$</li>
<li>Raíces reales distintas: $y = C_1e^{r_1x} + C_2e^{r_2x}$</li>
<li>Raíces repetidas: $y = (C_1 + C_2x)e^{rx}$</li>
<li>Raíces complejas: $y = e^{\alpha x}(C_1\cos(\beta x) + C_2\sin(\beta x))$</li>
<li>Aplicaciones: resortes, circuitos RLC, ondas, puentes</li>
</ul>
</div>
