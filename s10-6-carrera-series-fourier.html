<div class="chapter">
<h2 class="chapter-title">🌍 ¿Dónde encuentro Fourier?</h2>
<div class="box box-ejemplo">
<strong>💡 Caso real: Compresión de audio MP3</strong>
<p>Cualquier sonido puede descomponerse en una suma de senos y cosenos de diferentes frecuencias. ¡El MP3 usa la Transformada Rápida de Fourier para comprimir audio!</p>
<p>La música que escuchas = suma de ondas sinusoidales. Fourier te dice qué frecuencias hay y cuánto contribuye cada una.</p>
</div>
</div>

<div class="chapter">
<h2 class="chapter-title">1️⃣ Series de Fourier</h2>

<div class="formula" style="background:#f1f5f9;padding:1rem 1.2rem;border-radius:8px;font-size:1.2rem;text-align:center;margin:1rem 0;border-left:4px solid #6366f1">
$$f(x) = \frac{a_0}{2} + \sum_{n=1}^{\infty} \left[a_n \cos\left(\frac{n\pi x}{L}\right) + b_n \sin\left(\frac{n\pi x}{L}\right)\right]$$
</div>

<!-- GRÁFICO: Fourier -->
<div class="chart-container">
<h3>📊 Descomposición de Fourier: onda cuadrada ≈ suma de senos</h3>
<p class="chart-desc">Observa cómo al sumar más términos, la aproximación se acerca más a la onda cuadrada.</p>
<div id="plot-fourier" class="chart-plot"></div>
</div>
